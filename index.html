<head>

  <style>
    :root{

      --ok-bg:#c8f7c5; --ok-border:#16a34a;
      --bad-bg:#f7c5c5; --bad-border:#dc2626;
      --btn:#111827; --btn-text:#fff; --btn-hover:#0b1220;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--text);padding:20px}
    .container{max-width:980px;margin:0 auto}
    header{display:flex;gap:12px;align-items:center;justify-content:space-between;flex-wrap:wrap;margin-bottom:18px}
    h1{margin:0;font-size:24px;letter-spacing:.2px}
    .controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .btn{appearance:none;border:1px solid var(--btn);background:var(--btn);color:var(--btn-text);padding:10px 12px;border-radius:10px;cursor:pointer;font-weight:800;box-shadow:var(--shadow);transition:transform .05s ease,background .2s ease}
    .btn:hover{background:var(--btn-hover)}
    .btn:active{transform:scale(.99)}
    .pill{background:var(--card);border:1px solid var(--border);border-radius:999px;padding:8px 12px;box-shadow:var(--shadow);font-weight:800;color:var(--muted)}
    .question{background:var(--card);border:1px solid var(--border);padding:18px;margin-bottom:14px;border-radius:14px;box-shadow:var(--shadow)}
    .question h3{margin:0 0 10px 0;font-size:16px;line-height:1.35}
    .answers{display:flex;flex-direction:column;gap:8px;margin-top:8px}
    .answers button{text-align:left;width:100%;padding:10px 12px;border-radius:10px;border:1px solid var(--border);background:#f9fafb;cursor:pointer;transition:background .2s ease,transform .05s ease;font-size:14px;line-height:1.35}
    .answers button:hover{background:#eef2f7}
    .answers button:active{transform:scale(.995)}
    .answers button:disabled{cursor:not-allowed;opacity:.97}
    .correct{background:var(--ok-bg)!important;border:2px solid var(--ok-border)!important}
    .incorrect{background:var(--bad-bg)!important;border:2px solid var(--bad-border)!important}
    .hint{margin-top:10px;font-weight:900;display:none}
    .hint.ok{color:var(--ok-border)}
    .hint.bad{color:var(--bad-border)}
    .footer-note{margin-top:10px;font-size:12px;color:var(--muted)}
  </style>
</head>

    const quizContainer = document.getElementById("quiz");
    const resetBtn = document.getElementById("resetBtn");
    const statusPill = document.getElementById("statusPill");

    let answeredCount = 0;

    function updateStatus() {
      statusPill.textContent = `Respondidas: ${answeredCount} / ${questions.length}`;
    }

    function createQuestionCard(q, index) {
      const questionDiv = document.createElement("div");
      questionDiv.className = "question";

      const title = document.createElement("h3");
      title.textContent = `${index + 1}. ${q.question}`;
      questionDiv.appendChild(title);

      const answersDiv = document.createElement("div");
      answersDiv.className = "answers";

      const hint = document.createElement("div");
      hint.className = "hint";

      for (const key of Object.keys(q.answers)) {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.dataset.key = key;
        btn.textContent = `${key.toUpperCase()}. ${q.answers[key]}`;
        btn.addEventListener("click", () => handleAnswerClick(q, answersDiv, btn, hint));
        answersDiv.appendChild(btn);
      }

      questionDiv.appendChild(answersDiv);
      questionDiv.appendChild(hint);
      return questionDiv;
    }

    function handleAnswerClick(q, answersDiv, clickedButton, hintEl) {
      const allButtons = Array.from(answersDiv.querySelectorAll("button"));
      if (allButtons.every(b => b.disabled)) return;

      allButtons.forEach(btn => btn.disabled = true);

      const selectedKey = clickedButton.dataset.key;

      if (selectedKey === q.correct) {
        clickedButton.classList.add("correct");
        clickedButton.textContent += " ✅";
        hintEl.textContent = "Correcta ✅";
        hintEl.classList.add("ok");
        hintEl.classList.remove("bad");
      } else {
        clickedButton.classList.add("incorrect");
        clickedButton.textContent += " ❌";

        const correctBtn = allButtons.find(btn => btn.dataset.key === q.correct);
        if (correctBtn) {
          correctBtn.classList.add("correct");
          correctBtn.textContent += " ✅";
        }

        hintEl.textContent = "Incorrecta ❌";
        hintEl.classList.add("bad");
        hintEl.classList.remove("ok");
      }

      hintEl.style.display = "block";
      answeredCount += 1;
      updateStatus();
    }

    function renderQuiz() {
      quizContainer.innerHTML = "";
      answeredCount = 0;
      updateStatus();

      questions.forEach((q, index) => {
        quizContainer.appendChild(createQuestionCard(q, index));
      });

      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    resetBtn.addEventListener("click", renderQuiz);
    renderQuiz();
  </script>
